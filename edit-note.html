<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Note - Notes App</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo" class="logo" />
            <h1>Edit Your Note</h1>
        </header>

        <section class="edit-note-form">
            <form action="#" method="POST">
                <!-- Title -->
                <div class="form-group">
                    <label for="note-title">Title</label>
                    <input type="text" id="note-title" name="note-title" value="Building My First Note-Taking App 🚀"
                        required />
                </div>

                <!-- Content -->
                <div class="form-group">
                    <label for="note-content">Content</label>
                    <textarea id="note-content" name="note-content" rows="6" required>
            Started building my own note-taking app today! It’s going pretty well so far. Loving the process! 🚀
          </textarea>
                </div>

                <!-- Visibility -->
                <div class="form-group visibility">
                    <span>Visibility:</span>
                    <label>
                        <input type="radio" name="visibility" value="public" checked> Public
                    </label>
                    <label>
                        <input type="radio" name="visibility" value="private"> Private
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">Save Changes</button>
            </form>
        </section>

        <footer>
            <a href="/">To main page</a>
            <p>&copy; 2025 Notes App. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
