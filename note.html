<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Detail - Notes App</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <header>
            <h1>Note Details</h1>
        </header>

        <section class="note-detail">
            <div class="note-card" data-visibility="public">
                <h2 class="note-title">Building My First Note-Taking App 🚀</h2>
                <p class="note-text">
                    "Started building my own note-taking app today! It’s going pretty well so far. Loving the process!"
                </p>

                <div class="note-meta">
                    <p><strong>Author:</strong> codeMaster</p>
                    <span class="note-visibility">Public</span>
                    <p><strong>Last Changed:</strong> April 10, 2025</p>
                    <p><strong>Created:</strong> April 10, 2025</p>
                </div>
            </div>
        </section>

        <footer>
            <a href="/">To main page</a>
            <p>&copy; 2025 Notes App. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
