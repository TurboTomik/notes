<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Note - Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Create a New Note</h1>
    </header>
    
    <main>
      <section class="note-form">
        <form id="noteForm">
          <div class="form-group">
            <label for="noteText">Note:</label>
            <input type="text" name="title" placeholder="Write title for the note..." required> 
            <textarea id="noteText" name="noteText" rows="4" placeholder="Write your note here..." required></textarea>
          </div>
          <div class="form-group visibility">
            <span>Visibility:</span>
            <label>
              <input type="radio" name="visibility" value="public" checked> Public
            </label>
            <label>
              <input type="radio" name="visibility" value="private"> Private
            </label>
          </div>
          <button type="submit">Save Note</button>
        </form>
      </section>
    <footer>
      <a href="/">To main page</a>
      <p>&copy; 2025 Notes Application</p>
    </footer>
  </div>
</body>
</html>
